<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏝 Treasure Island</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

<div class="game-card">

<h1>🏝 Treasure Island</h1>

<p class="subtitle">
Your mission is to find the hidden treasure.
Choose wisely...
</p>

<div id="question">
<h2>You're at a crossroad.</h2>
<p>Where do you want to go?</p>
</div>

<div id="choices">
<button onclick="crossRoad('left')">⬅ Left</button>
<button onclick="crossRoad('right')">➡ Right</button>
</div>

<div id="result"></div>

<button id="restart" onclick="location.reload()">
🔄 Play Again
</button>

<button id="music" onclick="toggleMusic()">
🎵 Music
</button>

<audio id="bgMusic" loop>
<source src="background.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
